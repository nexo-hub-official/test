<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key System</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      width: min(420px, 90vw);
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    p {
      margin: 0 0 18px;
      color: #94a3b8;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: #f8fafc;
    }

    button.secondary {
      background: #334155;
    }

    #status {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Key System</h1>
    <p>Use the option below to get your access key.</p>
    <div class="actions">
      <button id="get-key-btn">Linkvertise Get Key</button>
      <button id="verify-btn" class="secondary">Verify Key</button>
    </div>
    <div id="status">Status: waiting for action...</div>
  </main>

  <script src="https://publisher.linkvertise.com/cdn/linkvertise.js"></script>
  <script>
    linkvertise(4479520, { whitelist: [], blacklist: [""] });

    const statusEl = document.getElementById('status');

    document.getElementById('get-key-btn').addEventListener('click', () => {
      statusEl.textContent = 'Status: opening Linkvertise to get your key...';
      window.open('https://link-target.net/4479520', '_blank', 'noopener');
    });

    document.getElementById('verify-btn').addEventListener('click', () => {
      statusEl.textContent = 'Status: key verification placeholder (connect your backend logic here).';
    });
  </script>
</body>
</html>
